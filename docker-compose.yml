version: "3.9"

# =============================================================================
# PII-Safe — Full Service Stack
# Issue: https://github.com/c2siorg/PII-Safe/issues/7
#
# Services:
#   api       — FastAPI middleware (PII redaction / pseudonymisation)
#   postgres  — Audit log persistence
#   redis     — Session token map caching
#   nginx     — Reverse proxy (optional, can be removed for local dev)
#
# Usage:
#   cp .env.example .env        # fill in secrets
#   docker-compose up --build   # start everything
#   docker-compose down -v      # teardown incl. volumes
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # FastAPI — PII-Safe middleware
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: piisafe_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - piisafe_net
    volumes:
      - ./app:/app/app:ro   # mount source for easy dev iteration

  # ---------------------------------------------------------------------------
  # PostgreSQL — Audit log persistence
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: piisafe_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - piisafe_net

  # ---------------------------------------------------------------------------
  # Redis — Session token map caching + rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: piisafe_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAX_MEMORY:-256mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - piisafe_net

  # ---------------------------------------------------------------------------
  # Nginx — Reverse proxy (disable by commenting out for pure local dev)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: piisafe_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - piisafe_net

# =============================================================================
# Volumes & Networks
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  piisafe_net:
    driver: bridge
